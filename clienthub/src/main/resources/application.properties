spring.application.name=clienthub

# CONFIGURACAO H2 (BANCO EM MEMORIA TEMPORARIO)
spring.datasource.url=jdbc:h2:mem:clienthub
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Descomente abaixo para voltar pro MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/clienthub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# RNF0111 - Comunicação Segura (HTTPS)
# Para habilitar 100% o HTTPS localmente, gere um certificado SSL (ex: via keytool)
# e descomente as propriedades abaixo:
# server.port=8443
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=sua_senha_aqui
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
